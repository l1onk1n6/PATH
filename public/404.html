<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>PATH</title>
  <script>
    // GitHub Pages has no server-side routing — it returns this file for any
    // path that isn't a real file (e.g. path.pixmatic.ch/anything).
    // Re-encode the path as a hash so the HashRouter SPA can handle it:
    //   /some/path  →  /#/some/path  →  React NotFoundPage (or matched route)
    window.location.replace(
      '/#' + window.location.pathname + window.location.search
    );
  </script>
</head>
<body></body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="PDF Export mit einem Klick">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1821"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#00C7BE"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#34C759" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34C759" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="540" cy="420" r="480" fill="url(#spot)"/>

  <!-- PDF document icon -->
  <g transform="translate(540,410)">
    <g transform="translate(-160,-200)">
      <rect width="320" height="400" rx="20" fill="#ffffff"/>
      <path d="M240 0 L320 80 L240 80 Z" fill="#e6f6f2"/>
      <rect x="30" y="40" width="180" height="14" rx="3" fill="#0f1923"/>
      <rect x="30" y="62" width="140" height="8" rx="3" fill="#a9bcc3"/>
      <rect x="30" y="100" width="260" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="114" width="240" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="128" width="250" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="142" width="220" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="172" width="260" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="186" width="240" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="216" width="100" height="30" rx="6" fill="url(#brand)"/>
      <text x="80" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="14" fill="#0f1923">PDF</text>
      <rect x="140" y="216" width="150" height="30" rx="6" fill="#eefbf2"/>
      <rect x="30" y="270" width="260" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="284" width="240" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="298" width="260" height="6" rx="2" fill="#dfe8ec"/>
      <rect x="30" y="312" width="210" height="6" rx="2" fill="#dfe8ec"/>
    </g>
    <!-- Download arrow -->
    <g transform="translate(140,100)">
      <circle r="62" fill="url(#brand)"/>
      <path d="M0 -30 L0 20" stroke="#0f1923" stroke-width="7" stroke-linecap="round"/>
      <path d="M-18 4 L0 22 L18 4" stroke="#0f1923" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="-24" y="32" width="48" height="6" rx="3" fill="#0f1923"/>
    </g>
  </g>

  <!-- Headline -->
  <g transform="translate(540,770)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
    <text font-weight="800" font-size="96" fill="#ffffff" letter-spacing="-2">1-Klick-Export.</text>
    <text y="105" font-weight="800" font-size="96" fill="url(#brand)" letter-spacing="-2">Komplette Mappe.</text>
  </g>

  <text x="540" y="970" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="26" fill="#9fb3b9">Anschreiben + Lebenslauf + Dokumente · ≤ 5 MB</text>

  <!-- Brand corner -->
  <g transform="translate(60,60)">
    <rect width="46" height="46" rx="12" fill="url(#brand)"/>
    <path d="M14 34 L32 16" stroke="white" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M20 16 H32 V28" stroke="white" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="30" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="24" fill="#ffffff" letter-spacing="5">PATH</text>
  </g>
</svg>

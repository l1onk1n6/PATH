<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#00C7BE"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#00C7BE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="#007AFF" opacity="0.06" filter="url(#glow)"/>
  <ellipse cx="1000" cy="480" rx="280" ry="180" fill="#34C759" opacity="0.07" filter="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Logo icon -->
  <rect x="96" y="180" width="72" height="72" rx="18" fill="url(#logoGrad)"/>
  <path d="M112 234L156 192" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M132 192H156V216" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="192" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">PATH</text>

  <!-- Tagline -->
  <text x="96" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.55">Bewerbungsmappe leicht gemacht</text>

  <!-- Feature pills -->
  <rect x="96" y="370" width="200" height="40" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="196" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="white" opacity="0.7" text-anchor="middle">Lebenslauf</text>

  <rect x="312" y="370" width="200" height="40" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="412" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="white" opacity="0.7" text-anchor="middle">Anschreiben</text>

  <rect x="528" y="370" width="200" height="40" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="628" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="white" opacity="0.7" text-anchor="middle">PDF Export</text>

  <rect x="744" y="370" width="200" height="40" rx="20" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="844" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="white" opacity="0.7" text-anchor="middle">15+ Templates</text>

  <!-- URL -->
  <text x="96" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#34C759" opacity="0.8">path.pixmatic.ch</text>

  <!-- by pixmatic -->
  <text x="1104" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="white" opacity="0.25" text-anchor="end">by pixmatic</text>
</svg>

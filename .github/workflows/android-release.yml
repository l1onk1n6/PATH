name: Build Signed Android AAB (Play Store)

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version name (z. B. 1.0.0) - wird in build.gradle gesetzt'
        required: false
        default: ''
      versionCode:
        description: 'Version code (Integer, muss bei jedem Release steigen)'
        required: false
        default: ''

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/upload.jks
          echo "PATH_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> $GITHUB_ENV

      - name: Override version (optional)
        if: ${{ inputs.versionName != '' || inputs.versionCode != '' }}
        run: |
          if [ -n "${{ inputs.versionName }}" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"${{ inputs.versionName }}\"/" android/app/build.gradle
          fi
          if [ -n "${{ inputs.versionCode }}" ]; then
            sed -i "s/versionCode [0-9]*/versionCode ${{ inputs.versionCode }}/" android/app/build.gradle
          fi
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Capacitor sync
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build release AAB
        working-directory: android
        env:
          PATH_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          PATH_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: path-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Clean up keystore
        if: always()
        run: rm -f $RUNNER_TEMP/upload.jks

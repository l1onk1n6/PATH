name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, claude/push-local-commits-j8RTh]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAAC8OhI6nS1QPcZlm

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: path.pixmatic.ch
          force_orphan: true

  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy contact-form    --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy track-view      --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy get-shared-docs --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy on-user-signup              --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy sync-existing-users         --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy stripe-webhook              --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Set Edge Function secrets
        if: ${{ secrets.TURNSTILE_SECRET_KEY != '' }}
        run: |
          supabase secrets set TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
